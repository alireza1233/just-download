# نام فایل: .github/workflows/download-acd.yml
name: Download ACD Components

on:
  workflow_dispatch:

# Allow writing to repo and creating releases
permissions:
  contents: write
  # actions: write  # commented: this is not needed for asset uploads

jobs:
  download-acd:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Download main ACD program (latest, v2.0.1)
      - name: Download main ACD Windows program
        shell: pwsh
        run: |
          $url = "https://github.com/soroushamdg/acd/releases/download/0v2.0.1/acd_windows.zip"
          $outFile = "acd_windows.zip"
          Write-Host "Downloading main ACD from $url ..."
          Invoke-WebRequest -Uri $url -OutFile $outFile
          Write-Host "Download completed."

      # 2. Download engine (ACD_ENGINE.zip)
      - name: Download ACD Engine
        shell: pwsh
        run: |
          $url = "https://github.com/soroushamdg/acd/releases/download/2v1.6/ACD_ENGINE.zip"
          $outFile = "ACD_ENGINE.zip"
          Write-Host "Downloading ACD Engine from $url ..."
          Invoke-WebRequest -Uri $url -OutFile $outFile
          Write-Host "Download completed."

      # 3. Download database.acddb
      - name: Download ACD Database
        shell: pwsh
        run: |
          $url = "https://github.com/soroushamdg/acd/releases/download/2v1.6/database.acddb"
          $outFile = "database.acddb"
          Write-Host "Downloading ACD Database from $url ..."
          Invoke-WebRequest -Uri $url -OutFile $outFile
          Write-Host "Download completed."

      # 4. Download FFmpeg (full build, portable) with retry 
      #    (current filename is ffmpeg-release-full.7z, not .zip)
      - name: Download FFmpeg (full build)
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full.7z"
          $outFile = "ffmpeg-release-full.7z"
          $maxAttempts = 3
          $attempt = 1
          $downloaded = $false
          while ($attempt -le $maxAttempts -and -not $downloaded) {
            try {
              Write-Host "Download attempt $attempt from $url ..."
              Invoke-WebRequest -Uri $url -OutFile $outFile -ErrorAction Stop
              $downloaded = $true
              Write-Host "FFmpeg downloaded successfully."
            }
            catch {
              Write-Host "Attempt $attempt failed: $_"
              $attempt++
              if ($attempt -le $maxAttempts) {
                Start-Sleep -Seconds 5
              }
            }
          }
          if (-not $downloaded) {
            Write-Host "Failed to download FFmpeg after $maxAttempts attempts."
            exit 1
          }

      # ---- Optional: Verify and Set Up Components ----
      - name: Verify downloads
        shell: pwsh
        run: |
          Get-ChildItem -Filter *.zip,*.acddb,*.7z

      # ---- Bundle into a release artifact ----
      - name: Prepare release directory
        shell: pwsh
        run: |
          mkdir release_package
          Move-Item -Path acd_windows.zip -Destination release_package/
          Move-Item -Path ACD_ENGINE.zip -Destination release_package/
          Move-Item -Path database.acddb -Destination release_package/
          Move-Item -Path ffmpeg-release-full.7z -Destination release_package/

      - name: Upload artifact (for manual download)
        uses: actions/upload-artifact@v4
        with:
          name: acd_components_package
          path: release_package/

      # ---- Commit the precompiled assets to main branch ----
      - name: Push to main branch
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "actions@github.com"
          git add release_package/
          git commit -m "Add precompiled ACD components (engine, database, ffmpeg)"
          git push origin main
